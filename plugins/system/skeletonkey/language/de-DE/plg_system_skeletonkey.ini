PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_LABEL="Administrationsgruppen"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_DESC="Jeder Benutzer, der mindestens einer dieser Benutzergruppen angehört, darf sich als ein anderer Benutzer anmelden."

PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_LABEL="Erlaubte Anmeldegruppen"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_DESC="Benutzer, die mindestens einer dieser Benutzergruppen angehören, können von Mitgliedern der Administrationsgruppen als Zielbenutzer für eine Anmeldung verwendet werden."

PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_LABEL="Nicht erlaubte Anmeldegruppen"
PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_DESC="Benutzer, die mindestens einer dieser Benutzergruppen angehören, können nicht von Mitgliedern der Administrationsgruppen als Zielbenutzer verwendet werden. Wenn ein Benutzer sowohl einer erlaubten <em>als auch</em> einer nicht erlaubten Gruppe angehört, hat die nicht erlaubte Gruppe Vorrang."

PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_LABEL="Cookie-Lebensdauer (Sekunden)"
PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_DESC="Wie lange das Skeleton Key Cookie gültig ist. Halten Sie diesen Wert niedrig, um Sicherheitsprobleme zu vermeiden. Standard: 10 Sekunden."

PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_LABEL="Schlüssellänge"
PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_DESC="Die Länge (in Zeichen) des zufällig generierten Tokens für die Skeleton Key-Anmeldung. Je länger, desto besser für die Sicherheit. Standard: 32."

