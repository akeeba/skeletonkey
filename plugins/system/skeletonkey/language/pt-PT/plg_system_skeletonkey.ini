PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_LABEL="Grupos de Administradores"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_DESC="Qualquer utilizador que pertença a pelo menos um destes grupos de utilizadores terá permissão para iniciar sessão como outro utilizador."

PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_LABEL="Grupos de início de sessão permitidos"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_DESC="Os utilizadores que pertençam a pelo menos um destes grupos de utilizadores poderão ser usados como alvo de início de sessão pelos membros dos Grupos de Administradores."

PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_LABEL="Grupos de início de sessão não permitidos"
PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_DESC="Os utilizadores que pertençam a pelo menos um destes grupos de utilizadores não poderão ser usados como alvo de início de sessão pelos membros dos Grupos de Administradores. Se um utilizador pertencer tanto a um grupo permitido <em>como</em> a um não permitido, o grupo não permitido tem prioridade."

PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_LABEL="Duração do cookie (segundos)"
PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_DESC="Durante quanto tempo o cookie do Skeleton Key será válido. Mantenha-o baixo para evitar problemas de segurança. Predefinição: 10 segundos."

PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_LABEL="Comprimento da chave"
PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_DESC="O comprimento (em caracteres) do token aleatório gerado para o início de sessão com Skeleton Key. Quanto mais longo, melhor para a segurança. Predefinição: 32."

PLG_SYSTEM_SKELETONKEY_LBL_NOAUTHPLUGIN="Por favor, publique o plugin «Authentication - Skeleton Key» para poder iniciar sessão na interface pública como outro utilizador."
PLG_SYSTEM_SKELETONKEY_BTN_LABEL="Iniciar sessão como utilizador"
PLG_SYSTEM_SKELETONKEY_ERR_LOGINFAILED_AJAX="Falha no início de sessão: não foi possível executar a operação AJAX necessária para definir o cookie do Skeleton Key."
PLG_SYSTEM_SKELETONKEY_ERR_LOGINFAILED="Falha no início de sessão: não foi possível criar o cookie do Skeleton Key para o utilizador solicitado."
