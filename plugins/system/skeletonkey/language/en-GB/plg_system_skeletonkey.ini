PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_DESC="Users who belong to at least one of these user groups will not be available to be logged in by Admin Groups users. If a user belongs to both an allowed <em>and</em> a disallowed user group, the disallowed group wins, i.e. the user will not be available to be logged in."

