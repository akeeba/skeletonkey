PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_LABEL="Key Length"
PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_DESC="The length (in characters) of the random token generated for the Skeleton Key log-in. The longer the better for security. Default: 32."

