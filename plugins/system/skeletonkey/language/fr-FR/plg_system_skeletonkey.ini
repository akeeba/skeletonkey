PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_LABEL="Groupes Administrateurs"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_DESC="Tout utilisateur appartenant à au moins l'un de ces groupes d'utilisateurs sera autorisé à se connecter en tant qu'un autre utilisateur."

PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_LABEL="Groupes de connexion autorisés"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_DESC="Les utilisateurs appartenant à au moins l'un de ces groupes d'utilisateurs pourront être utilisés comme cibles de connexion par les membres des Groupes Administrateurs."

PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_LABEL="Groupes de connexion non autorisés"
PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_DESC="Les utilisateurs appartenant à au moins l'un de ces groupes d'utilisateurs ne pourront pas être utilisés comme cibles de connexion par les membres des Groupes Administrateurs. Si un utilisateur appartient à un groupe autorisé <em>et</em> à un groupe non autorisé, le groupe non autorisé est prioritaire."

PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_LABEL="Durée de vie du cookie (secondes)"
PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_DESC="Durée de validité du cookie Skeleton Key. Gardez cette valeur basse pour éviter les problèmes de sécurité. Par défaut : 10 secondes."

PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_LABEL="Longueur de la clé"
PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_DESC="La longueur (en caractères) du jeton aléatoire généré pour la connexion Skeleton Key. Plus il est long, meilleure est la sécurité. Par défaut : 32."

PLG_SYSTEM_SKELETONKEY_LBL_NOAUTHPLUGIN="Veuillez publier le plugin « Authentication - Skeleton Key » pour pouvoir vous connecter à l'interface publique en tant qu'un autre utilisateur."
PLG_SYSTEM_SKELETONKEY_BTN_LABEL="Se connecter en tant qu'utilisateur"
PLG_SYSTEM_SKELETONKEY_ERR_LOGINFAILED_AJAX="Échec de la connexion : impossible d'effectuer l'opération AJAX requise pour définir le cookie Skeleton Key."
PLG_SYSTEM_SKELETONKEY_ERR_LOGINFAILED="Échec de la connexion : impossible de créer le cookie Skeleton Key pour l'utilisateur demandé."
