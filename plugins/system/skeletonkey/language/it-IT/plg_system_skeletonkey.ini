PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_LABEL="Gruppi Amministratori"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_DESC="Qualsiasi utente appartenente ad almeno uno di questi gruppi di utenti sarà autorizzato ad accedere come un altro utente."

PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_LABEL="Gruppi di accesso consentiti"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_DESC="Gli utenti appartenenti ad almeno uno di questi gruppi di utenti potranno essere usati come destinatari dell'accesso da parte dei membri dei Gruppi Amministratori."

PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_LABEL="Gruppi di accesso non consentiti"
PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_DESC="Gli utenti appartenenti ad almeno uno di questi gruppi di utenti non potranno essere usati come destinatari dell'accesso da parte dei membri dei Gruppi Amministratori. Se un utente appartiene sia a un gruppo consentito <em>che</em> a uno non consentito, il gruppo non consentito ha la precedenza."

PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_LABEL="Durata del cookie (secondi)"
PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_DESC="Per quanto tempo il cookie di Skeleton Key sarà valido. Mantenetelo basso per evitare problemi di sicurezza. Predefinito: 10 secondi."

PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_LABEL="Lunghezza chiave"
PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_DESC="La lunghezza (in caratteri) del token casuale generato per l'accesso con Skeleton Key. Più è lungo, meglio è per la sicurezza. Predefinito: 32."

PLG_SYSTEM_SKELETONKEY_LBL_NOAUTHPLUGIN="Per favore, pubblica il plugin «Authentication - Skeleton Key» per poter accedere al frontend come un altro utente."
PLG_SYSTEM_SKELETONKEY_BTN_LABEL="Accedi come utente"
