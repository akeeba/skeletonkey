PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_LABEL="Grupos de Administradores"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDCONTROLGROUPS_DESC="Cualquier usuario que pertenezca a al menos uno de estos grupos de usuarios podrá iniciar sesión como otro usuario."

PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_LABEL="Grupos de inicio de sesión permitidos"
PLG_SYSTEM_SKELETONKEY_CONFIG_ALLOWEDTARGETGROUPS_DESC="Los usuarios que pertenezcan a al menos uno de estos grupos de usuarios podrán ser usados como objetivo de inicio de sesión por los miembros de los Grupos de Administradores."

PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_LABEL="Grupos de inicio de sesión no permitidos"
PLG_SYSTEM_SKELETONKEY_CONFIG_DISALLOWEDTARGETGROUPS_DESC="Los usuarios que pertenezcan a al menos uno de estos grupos de usuarios no podrán ser usados como objetivo de inicio de sesión por los miembros de los Grupos de Administradores. Si un usuario pertenece tanto a un grupo permitido <em>como</em> a uno no permitido, el grupo no permitido tiene prioridad."

PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_LABEL="Duración de la cookie (segundos)"
PLG_SYSTEM_SKELETONKEY_CONFIG_COOKIE_LIFETIME_DESC="Tiempo durante el cual la cookie de Skeleton Key será válida. Manténgalo bajo para evitar problemas de seguridad. Por defecto: 10 segundos."

PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_LABEL="Longitud de la clave"
PLG_SYSTEM_SKELETONKEY_CONFIG_KEY_LENGTH_DESC="La longitud (en caracteres) del token aleatorio generado para el inicio de sesión con Skeleton Key. Cuanto más largo, mejor para la seguridad. Por defecto: 32."

PLG_SYSTEM_SKELETONKEY_LBL_NOAUTHPLUGIN="Por favor, publique el plugin «Authentication - Skeleton Key» para poder iniciar sesión en el frontend como otro usuario."
PLG_SYSTEM_SKELETONKEY_BTN_LABEL="Iniciar sesión como usuario"
PLG_SYSTEM_SKELETONKEY_ERR_LOGINFAILED_AJAX="Error de inicio de sesión: no se puede realizar la operación AJAX requerida para establecer la cookie de Skeleton Key."
PLG_SYSTEM_SKELETONKEY_ERR_LOGINFAILED="Error de inicio de sesión: no se puede crear la cookie de Skeleton Key para el usuario solicitado."
